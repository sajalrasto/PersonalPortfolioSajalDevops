name: 🚀 Build & Deploy Portfolio

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: production
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & Deploy to Hostinger
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🏗️ Build Portfolio
        run: npm run build

      - name: ✅ Verify Build
        run: |
          test -f dist/index.html
          ls -lah dist
          du -sh dist

      - name: 🧹 Clean public_html
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USERNAME }}
          password: ${{ secrets.HOSTINGER_PASSWORD }}
          port: ${{ secrets.HOSTINGER_PORT }}
          script: |
            rm -rf /home/${{ secrets.HOSTINGER_USERNAME }}/domains/sajalrastogi.com/public_html/*
            mkdir -p /home/${{ secrets.HOSTINGER_USERNAME }}/domains/sajalrastogi.com/public_html

      - name: 🚀 Upload Website
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USERNAME }}
          password: ${{ secrets.HOSTINGER_PASSWORD }}
          port: ${{ secrets.HOSTINGER_PORT }}
          source: "dist/*"
          target: "/home/${{ secrets.HOSTINGER_USERNAME }}/domains/sajalrastogi.com/public_html"

      - name: 🎉 Deployment Complete
        run: echo "Portfolio deployed successfully!"