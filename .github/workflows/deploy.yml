name: 🚀 Build & Deploy Portfolio

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🏗️ Build Portfolio
        run: npm run build

      - name: ✅ Verify Build
        run: |
          test -f dist/index.html
          ls -lah dist

      - name: 🔑 Install sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: 🚀 Deploy to Hostinger
        env:
          SSHPASS: ${{ secrets.HOSTINGER_PASSWORD }}
        run: |
          sshpass -e rsync -avz --delete \
            -e "ssh -o StrictHostKeyChecking=no -p ${{ secrets.HOSTINGER_PORT }}" \
            dist/ \
            ${{ secrets.HOSTINGER_USERNAME }}@${{ secrets.HOSTINGER_HOST }}:/home/${{ secrets.HOSTINGER_USERNAME }}/domains/sajalrastogi.com/public_html/

      - name: 🎉 Deployment Complete
        run: echo "Portfolio deployed successfully!"