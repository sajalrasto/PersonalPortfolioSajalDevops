  <style>
    :root {
      /* Light Mode Defaults (Ceramic) */
      --background: #F8FAFC;
      --surface: #FFFFFF;
      --surface-highlight: #F1F5F9;
      --text: #0F172A;
      --text-muted: #64748B;
    }

    .dark {
      /* Dark Mode Defaults (Void) */
      --background: #020408;
      --surface: #0B0F17;
      --surface-highlight: #131B29;
      --text: #E2E8F0;
      --text-muted: #94A3B8;
    }

    body {
      background-color: var(--background);
      color: var(--text);
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      transition: background-color 0.3s ease, color 0.3s ease;
    }

    /* Noise Texture Overlay */
    .bg-noise {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 50;
    }

    /* Custom scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: var(--background);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--surface-highlight);
      border-radius: 4px;
      border: 2px solid var(--background);
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--text-muted);
    }

    .text-glow {
      text-shadow: 0 0 20px rgba(0, 240, 255, 0.3);
    }

    /* 3D Perspective */
    .perspective-1000 {
      perspective: 1000px;
    }

    .perspective-2000 {
      perspective: 2000px;
    }

    /* Paper on desk effect - smooth transforms */
    .paper-transform {
      transform-style: preserve-3d;
      transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    /* Swiper Custom Styles */
    .swiper {
      width: 100%;
      padding-top: 50px;
      padding-bottom: 50px;
    }

    .swiper-slide {
      background-position: center;
      background-size: cover;
    }

    /* Custom Pagination Dots */

      opacity: 0.5;
    }

    .swiper-pagination-bullet-active {
      background: #00F0FF;
      opacity: 1;
      box-shadow: 0 0 10px #00F0FF;
    }
  </style>

  <!-- Dynamic Theme Color Update -->
  <script>
    // Update theme-color meta tag based on current theme
    function updateThemeColor() {
      const isDark = document.documentElement.classList.contains('dark');
      const themeColorMeta = document.querySelector('meta[name="theme-color"]');
      if (themeColorMeta) {
        themeColorMeta.setAttribute('content', isDark ? '#020408' : '#F8FAFC');
      }
    }

    // Initial theme color
    updateThemeColor();

    // Watch for theme changes
    const observer = new MutationObserver(() => {
      updateThemeColor();
    });

    observer.observe(document.documentElement, {
      attributes: true,
      attributeFilter: ['class']
    });
  </script>
